name = "haybarn-status"
main = "src/index.js"
compatibility_date = "2025-10-01"
account_id = "bb68a133a66d26a310231495b13479a1"

# Workers KV: cached GH Actions API responses (run metadata, tag list, install token).
# Provision once with:
#   wrangler kv namespace create STATUS_KV
# then paste the returned id below.
[[kv_namespaces]]
binding = "STATUS_KV"
id = "85108e76b21b44ba9c69da7f26a4dc56"

# Custom domain. Cloudflare auto-creates the proxied DNS record in the
# query.farm zone on deploy and provisions the TLS cert.
[[routes]]
pattern = "haybarn-status.query.farm"
custom_domain = true

[observability]
enabled = true

# Custom domain `haybarn-status.query.farm` is bound in the Cloudflare
# dashboard (Workers & Pages -> haybarn-status -> Domains & Routes ->
# Add Custom Domain), matching the haybarn-vcpkg-worker convention.
# Secrets to provision (one-time):
#   wrangler secret put GH_APP_ID
#   wrangler secret put GH_APP_INSTALLATION_ID
#   wrangler secret put GH_APP_PRIVATE_KEY
