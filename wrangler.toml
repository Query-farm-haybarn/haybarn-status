name = "haybarn-status"
main = "src/index.js"
compatibility_date = "2025-10-01"
account_id = "bb68a133a66d26a310231495b13479a1"

# Workers KV: cached GH Actions API responses (run metadata, tag list, install token).
# Provision once with:
#   wrangler kv namespace create STATUS_KV
# then paste the returned id below.
[[kv_namespaces]]
binding = "STATUS_KV"
id = "85108e76b21b44ba9c69da7f26a4dc56"

# Custom domain. Cloudflare auto-creates the proxied DNS record in the
# query.farm zone on deploy and provisions the TLS cert.
[[routes]]
pattern = "haybarn-status.query.farm"
custom_domain = true

[observability]
enabled = true

# Cron-driven cache pre-warm. Worker's `scheduled` handler refreshes
# the heavy caches (community matrix + tag list) so human visits hit
# warm cache 99% of the time.
#
# Cadence history:
#   v1: */2 — 2 min. Sustainable when community matrix was 20 calls.
#   v2 (current): */15 — once the 244-extension catalog landed, the
#   community matrix paginates build.yml runs AND per-extension job
#   lists. With 244 unique extensions each forcing a job-list fetch,
#   a cold refresh costs ~250 GH calls. At 2-min cadence that's
#   ~7500/hr — close to the 15k installation-token budget, leaving
#   no headroom for rc page views (and we hit 403s in practice).
#   The companion per-run KV job cache in collect.js means subsequent
#   refreshes only fetch jobs for in-progress runs, so once warm the
#   cost drops back to ~10-30/refresh. */15 is plenty for a status
#   page where data doesn't change second-by-second.
[triggers]
crons = ["*/15 * * * *"]

# Custom domain `haybarn-status.query.farm` is bound in the Cloudflare
# dashboard (Workers & Pages -> haybarn-status -> Domains & Routes ->
# Add Custom Domain), matching the haybarn-vcpkg-worker convention.
# Secrets to provision (one-time):
#   wrangler secret put GH_APP_ID
#   wrangler secret put GH_APP_INSTALLATION_ID
#   wrangler secret put GH_APP_PRIVATE_KEY
